<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Confirmado - Tahm King</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="fondo-ticket-elegante">

<main class="tk-page-container">

    <div class="tk-header-icon-elegant">
        <i class="fas fa-check"></i>
    </div>

    <div class="tk-card-elegant">
        <div class="tk-confirm-body">
            <h1 class="tk-thanks-title">¡Gracias por su compra!</h1>
            <div class="tk-divider-thin"></div>
            <p class="tk-msg-small">SU CÓDIGO DE PEDIDO ES:</p>
            <h2 class="tk-order-id-display">#67</h2>
            <div class="tk-divider-thin"></div>
            <p class="tk-msg-footer">Por favor, muestre este código al recoger su pedido.</p>
        </div>
    </div>

    <div class="tk-footer-nav-elegant">
        <button class="btn-secondary" onclick="window.location.href='../index.html'">INICIO</button>
        <button class="btn-primary" onclick="window.location.href='historial.html'">VER HISTORIAL</button>
    </div>

</main>

<script src="../java/java.js"></script>
</body>
</html>
