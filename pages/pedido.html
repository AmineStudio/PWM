<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realizar Pedido</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body class="fondo-gris-pedido">

<div xlu-include-file="../components/header.html"></div>

<main class="contenedor-pedido-activo">

    <div class="tabs-categorias">
        <a href="#" class="tab-btn activo" data-categoria-id="1">ENTRANTES</a>
        <a href="#" class="tab-btn" data-categoria-id="2">HAMBURGUESAS</a>
        <a href="#" class="tab-btn" data-categoria-id="3">HOTDOGS</a>
        <a href="#" class="tab-btn" data-categoria-id="4">BEBIDAS</a>
        <a href="#" class="tab-btn" data-categoria-id="5">POSTRE</a>
        <a href="#" class="tab-btn" data-categoria-id="6">OFERTAS</a>
    </div>

    <div class="grid-productos-pedido" id="grid-pedido">
        <!-- Los productos se cargan dinámicamente -->
    </div>

    </div>
</main>

<div class="barra-acciones-fixed">

    <button class="btn-accion-circular rojo" onclick="window.history.back()">
        <span>&#10006;</span>
    </button>

    <button class="btn-accion-largo" onclick="window.location.href='lista-pedido.html'">
        Finalizar pedido
    </button>

    <button class="btn-accion-circular azul" onclick="window.location.href='lista-pedido.html'">
    </button>

</div>

<div xlu-include-file="../components/footer.html"></div>

<script src="../java/java.js"></script>

<script src="../java/producto-card.js"></script>
<script>
    document.addEventListener('componentesListos', () => {
        // Carga inicial — entrantes
        cargarProductos('grid-pedido', 'pedido', 1);

        // Filtro al pulsar categoría
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();

                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('activo'));
                btn.classList.add('activo');

                const categoriaId = parseInt(btn.dataset.categoriaId);
                cargarProductos('grid-pedido', 'pedido', categoriaId);
            });
        });
    });
</script>

</body>
</html>
