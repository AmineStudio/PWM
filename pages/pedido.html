<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos — Tahm King</title>

    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <script src="../java/java.js" defer></script>
    <script src="../java/pedidos.js" defer></script>
</head>

<body class="menu-page">

<!-- HEADER -->
<div data-xlu-include-file="components/header.html"></div>

<!-- SIDEBAR -->
<div data-xlu-include-file="components/sidebar.html"></div>

<!-- BOTONES FLOTANTES -->
<div class="pedido-actions">
    <button class="action-btn cancel">
        <i class="fa-solid fa-xmark"></i> Cancelar
    </button>

    <button class="action-btn cart">
        <i class="fa-solid fa-cart-shopping"></i> Carrito
    </button>

    <button class="action-btn finish">
        <i class="fa-solid fa-check"></i> Finalizar
    </button>
</div>

<!-- CONTENIDO -->
<main class="catalogo-main">
    <div class="carta-wrapper">
        <div data-xlu-include-file="components/carta.html"></div>
    </div>
</main>

<!-- FOOTER -->
<div data-xlu-include-file="components/footer.html"></div>

</body>
</html>
