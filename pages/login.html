<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Tahm King</title>

    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body class="login-body">
<div class="container" id="container">
    <div class="form-container sign-up">
        <form>
            <h1>Créate una cuenta</h1>
            <div class="social-icons">
                <a href="#"><i class="fa-brands fa-google-plus-g"></i></a>
                <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
                <a href="#"><i class="fa-brands fa-tiktok"></i></a>
            </div>
            <span>o usa tu correo para registrarte</span>
            <input type="text" placeholder="Nombre">
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Contraseña">
            <button type="button">Regístrate</button>
        </form>
    </div>
    <div class="form-container sign-in">
        <form>
            <h1>Inicia Sesión</h1>
            <div class="social-icons">
                <a href="#"><i class="fa-brands fa-google-plus-g"></i></a>
                <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
                <a href="#"><i class="fa-brands fa-tiktok"></i></a>
            </div>
            <span>o usa tu correo y contraseña</span>
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Contraseña">
            <a href="#">¿Has olvidado la contraseña?</a>
            <button type="button">Inicia sesión</button>
        </form>
    </div>
    <div class="toggle-container">
        <div class="toggle">
            <div class="toggle-panel toggle-left">
                <h1>¡Bienvenido!</h1>
                <p>Introduce tus datos y disfruta de todas las ventajas</p>
                <button class="hidden" id="login">Inicia Sesión</button>
            </div>
            <div class="toggle-panel toggle-right">
                <h1>¡Únete a Tahm King!</h1>
                <p>Regístrate y te regalamos 50 Tahm Coins</p>
                <button class="hidden" id="register">Regístrate</button>
            </div>
        </div>
    </div>

</div>
<script src="../java/login.js"></script>
</body>
</html>
