<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Carta - Tahm King</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div xlu-include-file="../components/header.html"></div>

<main class="seccion-carta-wrapper">

    <div class="menu-categorias">
        <a href="#" class="categoria-btn activo" data-categoria-id="1">ENTRANTES</a>
        <a href="#" class="categoria-btn" data-categoria-id="2">HAMBURGUESAS</a>
        <a href="#" class="categoria-btn" data-categoria-id="3">HOTDOGS</a>
        <a href="#" class="categoria-btn" data-categoria-id="4">BEBIDAS</a>
        <a href="#" class="categoria-btn" data-categoria-id="5">POSTRE</a>
    </div>

    <div class="menu-contenedor-rosa">

        <div class="menu-grid" id="grid-carta">

            <!-- Los productos se cargan dinámicamente -->

        </div>
    </div>
</main>

<div xlu-include-file="../components/footer.html"></div>
<script src="../java/java.js"></script>

<script src="../java/producto-card.js"></script>
<script>
    document.addEventListener('componentesListos', () => {
        // Carga inicial — entrantes
        cargarProductos('grid-carta', 'carta', 1);

        // Filtro al pulsar categoría
        document.querySelectorAll('.categoria-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();

                // Actualiza clase activo
                document.querySelectorAll('.categoria-btn').forEach(b => b.classList.remove('activo'));
                btn.classList.add('activo');

                // Filtra productos
                const categoriaId = parseInt(btn.dataset.categoriaId);
                cargarProductos('grid-carta', 'carta', categoriaId);
            });
        });
    });
</script>

</body>
</html>
