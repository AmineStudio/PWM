<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Compra - Tahm King</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="fondo-lista-pedido">

<div xlu-include-file="../components/header.html"></div>

<main class="tk-page-container">

  <div class="tk-header-icon">
    <i class="fas fa-shopping-cart" style="color: black;"></i>
  </div>

  <div class="tk-card tk-cart-sheet">
    <h1 class="tk-main-title">LISTA DE COMPRA</h1>

    <div class="tk-list-content" id="lista-productos">
      <!-- Se carga dinámicamente -->
    </div>

    <div class="tk-row tk-total-row">
      <strong>PRECIO TOTAL</strong>
      <span class="tk-dots"></span>
      <strong class="precio-total-final" id="precio-total">0.00€</strong>
    </div>
  </div>

  <div class="tk-footer-nav">

    <button class="tk-circle-btn tk-danger" onclick="window.history.back()">
      <i class="fas fa-times" style="color: white;"></i>
    </button>

    <button class="tk-btn-action" onclick="window.location.href='ticket.html'">
      FINALIZAR PEDIDO
    </button>

    <button class="tk-circle-btn tk-info" onclick="window.history.back()">
      <i class="fas fa-cart-plus"></i>
    </button>
  </div>

</main>

<script src="../java/producto-card.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    const carritoGuardado = JSON.parse(localStorage.getItem('carrito') || '{}');

    // Carga productos del JSON para obtener nombres y precios
    const res = await fetch('../data.json');
    const data = await res.json();

    const lista = document.getElementById('lista-productos');
    const totalEl = document.getElementById('precio-total');
    let total = 0;

    lista.innerHTML = '';

    Object.entries(carritoGuardado).forEach(([id, cantidad]) => {
      if (cantidad <= 0) return;

      const producto = data.productos.find(p => p.id === parseInt(id));
      if (!producto) return;

      const subtotal = producto.precio * cantidad;
      total += subtotal;

      lista.innerHTML += `
            <div class="tk-row" data-id="${producto.id}">
                <span class="nombre-producto">${producto.nombre.toUpperCase()} x${cantidad}</span>
                <span class="tk-dots"></span>
                <span class="precio-producto">${subtotal.toFixed(2)}€</span>
                <div class="tk-actions">
                    <i class="far fa-edit icono-accion" onclick="editarCantidad(${producto.id})"></i>
                    <i class="fas fa-times icono-accion rojo" onclick="eliminarProducto(${producto.id})"></i>
                </div>
            </div>
        `;
    });

    if (lista.innerHTML === '') {
      lista.innerHTML = '<p style="text-align:center; padding:20px;">No hay productos en el carrito.</p>';
    }

    totalEl.textContent = `${total.toFixed(2)}€`;
  });

  function eliminarProducto(id) {
    const carrito = JSON.parse(localStorage.getItem('carrito') || '{}');
    delete carrito[id];
    localStorage.setItem('carrito', JSON.stringify(carrito));
    location.reload();
  }

  function editarCantidad(id) {
    const nueva = prompt('Nueva cantidad:');
    if (nueva === null) return;
    const carrito = JSON.parse(localStorage.getItem('carrito') || '{}');
    carrito[id] = Math.max(0, parseInt(nueva) || 0);
    if (carrito[id] === 0) delete carrito[id];
    localStorage.setItem('carrito', JSON.stringify(carrito));
    location.reload();
  }
</script>
</body>
</html>
